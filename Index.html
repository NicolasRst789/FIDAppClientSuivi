<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FID – Suivi Client</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#f5f7fb; --panel:#ffffff; --panel2:#f8fafc; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0;
      --brand:#164e63; --brand2:#0891b2; --blue:#2563eb; --green:#059669; --amber:#d97706; --red:#dc2626; --violet:#7c3aed;
      --shadow:0 18px 45px rgba(15,23,42,.08); --shadow2:0 8px 22px rgba(15,23,42,.07); --radius:18px;
    }
    *{box-sizing:border-box} body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:var(--ink);background:linear-gradient(135deg,#eef7ff 0%,#f7fafc 45%,#fff 100%);}
    button,input,select,textarea{font:inherit} button{cursor:pointer}.app{min-height:100vh;display:grid;grid-template-columns:290px 1fr;}
    .sidebar{background:rgba(255,255,255,.82);backdrop-filter:blur(16px);border-right:1px solid var(--line);padding:22px 16px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;gap:18px}
    .brand{display:flex;gap:12px;align-items:center;padding:6px 8px}.logo{width:42px;height:42px;border-radius:14px;background:linear-gradient(135deg,var(--brand),var(--brand2));color:white;display:grid;place-items:center;font-weight:800;box-shadow:var(--shadow2)}.brand h1{font-size:15px;margin:0}.brand p{font-size:12px;margin:2px 0 0;color:var(--muted)}
    .nav{display:grid;gap:8px}.nav button,.client-row{border:0;background:transparent;border-radius:14px;padding:11px 12px;color:#334155;text-align:left;display:flex;align-items:center;gap:10px}.nav button.active,.nav button:hover,.client-row.active,.client-row:hover{background:#eaf6fb;color:#0e7490}.nav .ico{width:24px;text-align:center}
    .search{position:relative}.search input{width:100%;border:1px solid var(--line);border-radius:14px;padding:12px 14px;background:white;outline:none}.search input:focus{border-color:#67e8f9;box-shadow:0 0 0 4px #cffafe}
    .side-title{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:#94a3b8;font-weight:800;margin:0 4px}.client-list{overflow:auto;display:grid;gap:5px;padding-right:2px}.avatar{width:34px;height:34px;border-radius:12px;display:grid;place-items:center;color:white;font-size:12px;font-weight:800;background:linear-gradient(135deg,#164e63,#0891b2);flex:0 0 auto}.client-row .meta{min-width:0;flex:1}.client-row strong{font-size:13px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.client-row span{font-size:11px;color:#64748b}.pill-count{background:#dbeafe;color:#1d4ed8;border-radius:99px;padding:2px 7px;font-size:11px;font-weight:800}.new-client{margin-top:auto;border:0;border-radius:15px;padding:13px 14px;background:linear-gradient(135deg,var(--brand),var(--brand2));color:white;font-weight:800;box-shadow:var(--shadow2)}
    .main{padding:28px;min-width:0}.top{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:22px}.title h2{font-size:28px;margin:0;font-weight:800;letter-spacing:-.03em}.title p{margin:5px 0 0;color:var(--muted)}.actions{display:flex;gap:10px;flex-wrap:wrap}.btn{border:1px solid var(--line);border-radius:13px;padding:11px 14px;background:white;color:#334155;font-weight:700;box-shadow:0 1px 0 rgba(15,23,42,.03)}.btn.primary{border:0;background:linear-gradient(135deg,var(--brand),var(--brand2));color:white}.btn:hover{transform:translateY(-1px);box-shadow:var(--shadow2)}
    .grid{display:grid;gap:16px}.kpis{grid-template-columns:repeat(4,minmax(0,1fr));margin-bottom:22px}.card{background:rgba(255,255,255,.88);border:1px solid rgba(226,232,240,.9);border-radius:var(--radius);box-shadow:var(--shadow2)}.kpi{padding:18px}.kpi .num{font-size:31px;font-weight:850;letter-spacing:-.04em}.kpi .lbl{font-size:13px;color:var(--muted);margin-top:3px}.kpi .bar{height:5px;border-radius:99px;background:#e2e8f0;margin-top:15px;overflow:hidden}.kpi .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--brand),var(--brand2));border-radius:99px}
    .layout{display:grid;grid-template-columns:1.25fr .85fr;gap:18px}.section{padding:18px}.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px}.section h3{margin:0;font-size:15px}.hint{font-size:12px;color:var(--muted)}.empty{padding:35px;text-align:center;color:var(--muted);background:#f8fafc;border:1px dashed #cbd5e1;border-radius:16px}.item{display:flex;gap:12px;padding:14px;border-radius:15px;border:1px solid var(--line);background:white;margin-bottom:10px;align-items:flex-start}.item:hover{border-color:#bae6fd;box-shadow:var(--shadow2)}.item-main{flex:1;min-width:0}.item-title{font-weight:800;font-size:14px;margin-bottom:5px}.item-sub{font-size:12px;color:var(--muted);display:flex;gap:9px;flex-wrap:wrap}.badges{display:flex;gap:6px;flex-wrap:wrap}.badge{display:inline-flex;align-items:center;border-radius:999px;padding:4px 9px;font-size:11px;font-weight:800}.b-new{background:#dbeafe;color:#1d4ed8}.b-progress{background:#fef3c7;color:#92400e}.b-wait{background:#ede9fe;color:#5b21b6}.b-done{background:#dcfce7;color:#166534}.b-cancel{background:#f1f5f9;color:#475569}.b-high{background:#fee2e2;color:#991b1b}.b-mid{background:#fef3c7;color:#92400e}.b-low{background:#dcfce7;color:#166534}.b-active{background:#dcfce7;color:#166534}.b-inactive{background:#f1f5f9;color:#475569}
    .table{width:100%;border-collapse:separate;border-spacing:0 10px}.table th{text-align:left;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:#94a3b8;padding:0 12px}.table td{background:white;border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:14px 12px;font-size:13px}.table td:first-child{border-left:1px solid var(--line);border-radius:15px 0 0 15px}.table td:last-child{border-right:1px solid var(--line);border-radius:0 15px 15px 0}.table tr:hover td{border-color:#bae6fd;box-shadow:0 8px 20px rgba(15,23,42,.05)}
    .client-hero{padding:22px;margin-bottom:16px;display:flex;justify-content:space-between;gap:18px;align-items:flex-start}.client-id{display:flex;gap:16px;align-items:center}.client-id .avatar{width:56px;height:56px;border-radius:18px;font-size:17px}.client-id h2{margin:0;font-size:25px}.client-id p{margin:6px 0 0;color:var(--muted);font-size:13px}.tabs{display:flex;gap:8px;margin:4px 0 16px}.tab{border:1px solid var(--line);border-radius:999px;padding:10px 14px;background:white;color:#475569;font-weight:800}.tab.active{background:#0f172a;color:white;border-color:#0f172a}.checkbox{width:20px;height:20px;accent-color:#0891b2}.modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.45);display:grid;place-items:center;z-index:50;padding:20px}.modal{width:min(560px,100%);max-height:90vh;overflow:auto;background:white;border-radius:24px;padding:22px;box-shadow:0 30px 80px rgba(15,23,42,.28)}.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}.modal-head h3{margin:0;font-size:19px}.close{border:0;background:#f1f5f9;border-radius:12px;width:38px;height:38px}.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px}.field{margin-bottom:13px}.field label{display:block;font-size:12px;font-weight:800;color:#475569;margin-bottom:6px}.field input,.field select,.field textarea{width:100%;border:1px solid var(--line);border-radius:13px;padding:11px 12px;background:white;outline:none}.field textarea{min-height:90px;resize:vertical}.field input:focus,.field select:focus,.field textarea:focus{border-color:#67e8f9;box-shadow:0 0 0 4px #cffafe}.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:8px}.toast{position:fixed;right:24px;bottom:24px;background:#0f172a;color:white;padding:13px 16px;border-radius:14px;font-size:13px;font-weight:700;box-shadow:var(--shadow);z-index:99;opacity:0;transform:translateY(12px);transition:.2s}.toast.show{opacity:1;transform:translateY(0)}
    @media(max-width:1000px){.app{grid-template-columns:1fr}.sidebar{position:relative;height:auto}.client-list{max-height:260px}.kpis,.layout{grid-template-columns:1fr}.main{padding:18px}.top{align-items:flex-start;flex-direction:column}.form-grid{grid-template-columns:1fr}}
  </style>
</head>
<body><div id="app"></div><div id="toast" class="toast"></div>
<script>
const ST={nouveau:['Nouveau','b-new'],en_cours:['En cours','b-progress'],en_attente:['En attente','b-wait'],resolu:['Résolu','b-done'],annule:['Annulé','b-cancel']};
const PR={haute:['Haute','b-high'],moyenne:['Moyenne','b-mid'],basse:['Basse','b-low']};
const TY=['Devis','Avenant','Réclamation','Question','Modification','Autre'];
const KEY='fid-suivi-client-v2';
let S={view:'dashboard',cid:null,tab:'tasks',search:'',modal:null,mtid:null,etid:null,clients:[],tasks:[],actions:[],comments:[]};
function seed(){return {clients:[{id:'c1',nom:'Client Exemple SA',ref:'FID-2026-001',type:'Entreprise',resp:'Nicolas',email:'contact@example.com',tel:'',statut:'actif',ca:Date.now()}],tasks:[{id:'t1',cid:'c1',titre:'Préparer le devis initial',type:'Devis',statut:'en_cours',pr:'haute',resp:'Equipe FID',ech:new Date().toISOString().slice(0,10),desc:'Exemple de tâche modifiable.',ca:Date.now(),ua:Date.now()}],actions:[{id:'a1',cid:'c1',tid:'t1',titre:'Valider les informations client',resp:'Nicolas',ech:new Date().toISOString().slice(0,10),desc:'',done:false,ca:Date.now()}],comments:[{id:'m1',cid:'c1',tid:'t1',aut:'Nicolas',txt:'Premier commentaire de suivi.',ca:Date.now()}]}}
function load(){try{const d=JSON.parse(localStorage.getItem(KEY)); if(d) Object.assign(S,d); else Object.assign(S,seed());}catch(e){Object.assign(S,seed())}}
function save(){localStorage.setItem(KEY,JSON.stringify({clients:S.clients,tasks:S.tasks,actions:S.actions,comments:S.comments}));toast('Modifications enregistrées')}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8)}function today(){return new Date().toISOString().slice(0,10)}function fmt(d){return d?new Date(d+'T12:00:00').toLocaleDateString('fr-BE',{day:'2-digit',month:'2-digit',year:'numeric'}):'—'}function ini(n){return (n||'?').split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase()}function esc(s){return String(s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}function badge(v,map){const b=map[v]||['—','b-cancel'];return `<span class="badge ${b[1]}">${b[0]}</span>`}function openTasks(cid){return S.tasks.filter(t=>t.cid===cid&&!['resolu','annule'].includes(t.statut)).length}function cl(){return S.clients.find(c=>c.id===S.cid)}function toast(t){const el=document.getElementById('toast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1800)}
function shell(content,title,sub){return `<div class="app"><aside class="sidebar"><div class="brand"><div class="logo">FID</div><div><h1>Suivi Client</h1><p>Bureau de Tarification</p></div></div><div class="nav"><button class="${S.view==='dashboard'?'active':''}" onclick="go('dashboard')"><span class="ico">▦</span>Tableau de bord</button><button class="${S.view==='clients'?'active':''}" onclick="go('clients')"><span class="ico">◉</span>Tous les clients</button></div><div class="search"><input placeholder="Rechercher un client…" value="${esc(S.search)}" oninput="S.search=this.value;render()"></div><p class="side-title">Clients (${S.clients.length})</p><div class="client-list">${S.clients.filter(c=>!S.search||c.nom.toLowerCase().includes(S.search.toLowerCase())||(c.ref||'').toLowerCase().includes(S.search.toLowerCase())).map(c=>`<div class="client-row ${S.cid===c.id&&S.view==='client'?'active':''}" onclick="selectClient('${c.id}')"><div class="avatar">${ini(c.nom)}</div><div class="meta"><strong>${esc(c.nom)}</strong><span>${esc(c.ref||'Sans référence')}</span></div>${openTasks(c.id)?`<b class="pill-count">${openTasks(c.id)}</b>`:''}</div>`).join('')||'<div class="empty">Aucun client</div>'}</div><button class="new-client" onclick="openModal('client')">+ Nouveau client</button></aside><main class="main"><div class="top"><div class="title"><h2>${title}</h2><p>${sub}</p></div><div class="actions"><button class="btn" onclick="exportData()">Exporter JSON</button><button class="btn primary" onclick="openModal('client')">+ Nouveau client</button></div></div>${content}</main>${S.modal?modal():''}</div>`}
function dashboard(){const t=today(),open=S.tasks.filter(x=>!['resolu','annule'].includes(x.statut)),due=S.tasks.filter(x=>x.ech===t&&!['resolu','annule'].includes(x.statut)),late=S.tasks.filter(x=>x.ech&&x.ech<t&&!['resolu','annule'].includes(x.statut)),todo=S.actions.filter(a=>!a.done);return shell(`<div class="grid kpis"><div class="card kpi"><div class="num">${S.clients.filter(c=>c.statut!=='inactif').length}</div><div class="lbl">Clients actifs</div><div class="bar"><i style="width:72%"></i></div></div><div class="card kpi"><div class="num">${open.length}</div><div class="lbl">Tâches ouvertes</div><div class="bar"><i style="width:58%"></i></div></div><div class="card kpi"><div class="num" style="color:${late.length?'var(--red)':'inherit'}">${late.length}</div><div class="lbl">Tâches en retard</div><div class="bar"><i style="width:${Math.min(late.length*20,100)}%;background:var(--red)"></i></div></div><div class="card kpi"><div class="num">${todo.length}</div><div class="lbl">Actions à faire</div><div class="bar"><i style="width:44%;background:var(--green)"></i></div></div></div><div class="layout"><section class="card section"><div class="section-head"><h3>Tâches prioritaires</h3><span class="hint">Aujourd’hui et retards</span></div>${[...late,...due].slice(0,8).map(taskItem).join('')||'<div class="empty">Aucune tâche urgente</div>'}</section><section class="card section"><div class="section-head"><h3>Actions en attente</h3><span class="hint">À clôturer</span></div>${todo.slice(0,8).map(actionItem).join('')||'<div class="empty">Toutes les actions sont clôturées</div>'}</section></div>`,'Tableau de bord','Vue synthétique des clients, tâches, retards et actions.')}
function taskItem(t){const c=S.clients.find(x=>x.id===t.cid)||{};return `<div class="item"><div class="item-main"><div class="badges">${badge(t.statut,ST)}${badge(t.pr,PR)}</div><div class="item-title">${esc(t.titre)}</div><div class="item-sub"><span>${esc(c.nom||'')}</span><span>${esc(t.type)}</span><span>Échéance ${fmt(t.ech)}</span></div></div><button class="btn" onclick="selectClient('${t.cid}')">Ouvrir</button></div>`}
function actionItem(a){const c=S.clients.find(x=>x.id===a.cid)||{};return `<div class="item"><input class="checkbox" type="checkbox" ${a.done?'checked':''} onchange="toggleAction('${a.id}')"><div class="item-main"><div class="item-title">${esc(a.titre)}</div><div class="item-sub"><span>${esc(c.nom||'')}</span>${a.resp?`<span>${esc(a.resp)}</span>`:''}${a.ech?`<span>${fmt(a.ech)}</span>`:''}</div></div></div>`}
function clients(){const list=S.clients.filter(c=>!S.search||c.nom.toLowerCase().includes(S.search.toLowerCase())||(c.ref||'').toLowerCase().includes(S.search.toLowerCase()));return shell(`<div class="card section"><table class="table"><thead><tr><th>Client</th><th>Référence</th><th>Responsable</th><th>Tâches</th><th>Statut</th></tr></thead><tbody>${list.map(c=>`<tr onclick="selectClient('${c.id}')"><td><b>${esc(c.nom)}</b><br><span class="hint">${esc(c.email||'')}</span></td><td>${esc(c.ref||'—')}</td><td>${esc(c.resp||'—')}</td><td>${openTasks(c.id)}</td><td>${badge(c.statut||'actif',{actif:['Actif','b-active'],inactif:['Inactif','b-inactive']})}</td></tr>`).join('')}</tbody></table>${!list.length?'<div class="empty">Aucun client trouvé</div>':''}</div>`,'Tous les clients','Liste complète et recherche centralisée.')}
function detail(){const c=cl();if(!c)return dashboard();const tasks=S.tasks.filter(t=>t.cid===c.id),acts=S.actions.filter(a=>a.cid===c.id),cms=S.comments.filter(m=>m.cid===c.id);let body='';if(S.tab==='tasks')body=tasks.map(t=>`<div class="item"><div class="item-main"><div class="badges">${badge(t.statut,ST)}${badge(t.pr,PR)}<span class="badge b-cancel">${esc(t.type)}</span></div><div class="item-title">${esc(t.titre)}</div><div class="item-sub"><span>${esc(t.resp||'Non assigné')}</span><span>${fmt(t.ech)}</span></div>${t.desc?`<p class="hint">${esc(t.desc)}</p>`:''}</div><button class="btn" onclick="editTask('${t.id}')">Modifier</button></div>`).join('')||'<div class="empty">Aucune tâche</div>';if(S.tab==='actions')body=acts.map(actionItem).join('')||'<div class="empty">Aucune action</div>';if(S.tab==='comments')body=cms.sort((a,b)=>b.ca-a.ca).map(m=>`<div class="item"><div class="avatar">${ini(m.aut)}</div><div class="item-main"><div class="item-title">${esc(m.aut)} <span class="hint">${new Date(m.ca).toLocaleDateString('fr-BE')}</span></div><div>${esc(m.txt)}</div></div></div>`).join('')||'<div class="empty">Aucun commentaire</div>';return shell(`<div class="card client-hero"><div class="client-id"><div class="avatar">${ini(c.nom)}</div><div><h2>${esc(c.nom)}</h2><p>${esc(c.ref||'Sans référence')} · ${esc(c.resp||'Non assigné')} · ${esc(c.email||'')}</p></div></div><div class="badges">${badge(c.statut||'actif',{actif:['Actif','b-active'],inactif:['Inactif','b-inactive']})}</div></div><div class="actions" style="margin-bottom:14px"><button class="btn primary" onclick="openModal('task')">+ Tâche</button><button class="btn" onclick="openModal('action')">+ Action</button><button class="btn" onclick="openModal('comment')">+ Commentaire</button></div><div class="tabs"><button class="tab ${S.tab==='tasks'?'active':''}" onclick="S.tab='tasks';render()">Tâches (${tasks.length})</button><button class="tab ${S.tab==='actions'?'active':''}" onclick="S.tab='actions';render()">Actions (${acts.length})</button><button class="tab ${S.tab==='comments'?'active':''}" onclick="S.tab='comments';render()">Commentaires (${cms.length})</button></div><section class="card section">${body}</section>`,c.nom,'Fiche client détaillée et suivi opérationnel.')}
function modal(){let title='',body='',c=cl(),t=S.tasks.find(x=>x.id===S.etid);if(S.modal==='client'){title='Créer un client';body=`<form onsubmit="submitClient(event)"><div class="field"><label>Nom *</label><input name="nom" required autofocus></div><div class="form-grid"><div class="field"><label>Référence</label><input name="ref"></div><div class="field"><label>Type</label><select name="type"><option>Entreprise</option><option>Particulier</option></select></div></div><div class="field"><label>Responsable</label><input name="resp"></div><div class="form-grid"><div class="field"><label>Email</label><input name="email" type="email"></div><div class="field"><label>Téléphone</label><input name="tel"></div></div><div class="modal-actions"><button type="button" class="btn" onclick="closeModal()">Annuler</button><button class="btn primary">Créer</button></div></form>`}if(S.modal==='task'||S.modal==='edit'){title=S.modal==='edit'?'Modifier la tâche':'Créer une tâche';body=`<form onsubmit="submitTask(event)"><div class="field"><label>Titre *</label><input name="titre" required value="${esc(t?.titre||'')}" autofocus></div><div class="form-grid"><div class="field"><label>Type</label><select name="type">${TY.map(x=>`<option ${t?.type===x?'selected':''}>${x}</option>`).join('')}</select></div><div class="field"><label>Priorité</label><select name="pr"><option value="haute" ${t?.pr==='haute'?'selected':''}>Haute</option><option value="moyenne" ${!t||t.pr==='moyenne'?'selected':''}>Moyenne</option><option value="basse" ${t?.pr==='basse'?'selected':''}>Basse</option></select></div></div>${S.modal==='edit'?`<div class="field"><label>Statut</label><select name="statut">${Object.entries(ST).map(([k,v])=>`<option value="${k}" ${t?.statut===k?'selected':''}>${v[0]}</option>`).join('')}</select></div>`:''}<div class="form-grid"><div class="field"><label>Responsable</label><input name="resp" value="${esc(t?.resp||'')}"></div><div class="field"><label>Échéance</label><input name="ech" type="date" value="${esc(t?.ech||'')}"></div></div><div class="field"><label>Description</label><textarea name="desc">${esc(t?.desc||'')}</textarea></div><div class="modal-actions"><button type="button" class="btn" onclick="closeModal()">Annuler</button><button class="btn primary">Enregistrer</button></div></form>`}if(S.modal==='action'){title='Créer une action';body=`<form onsubmit="submitAction(event)"><div class="field"><label>Action *</label><input name="titre" required autofocus></div><div class="form-grid"><div class="field"><label>Responsable</label><input name="resp"></div><div class="field"><label>Échéance</label><input name="ech" type="date"></div></div><div class="field"><label>Description</label><textarea name="desc"></textarea></div><div class="modal-actions"><button type="button" class="btn" onclick="closeModal()">Annuler</button><button class="btn primary">Ajouter</button></div></form>`}if(S.modal==='comment'){title='Ajouter un commentaire';body=`<form onsubmit="submitComment(event)"><div class="field"><label>Auteur *</label><input name="aut" required autofocus></div><div class="field"><label>Commentaire *</label><textarea name="txt" required></textarea></div><div class="modal-actions"><button type="button" class="btn" onclick="closeModal()">Annuler</button><button class="btn primary">Ajouter</button></div></form>`}return `<div class="modal-bg" onclick="if(event.target.className==='modal-bg')closeModal()"><div class="modal"><div class="modal-head"><h3>${title}</h3><button class="close" onclick="closeModal()">✕</button></div>${body}</div></div>`}
function go(v){S.view=v;S.cid=null;render()}function selectClient(id){S.cid=id;S.view='client';S.tab='tasks';render()}function openModal(m){S.modal=m;render()}function closeModal(){S.modal=null;S.etid=null;render()}function editTask(id){S.etid=id;S.modal='edit';render()}function submitClient(e){e.preventDefault();const f=new FormData(e.target);const c={id:uid(),nom:f.get('nom'),ref:f.get('ref'),type:f.get('type'),resp:f.get('resp'),email:f.get('email'),tel:f.get('tel'),statut:'actif',ca:Date.now()};S.clients.push(c);S.cid=c.id;S.view='client';S.tab='tasks';closeModal();save();render()}function submitTask(e){e.preventDefault();const f=new FormData(e.target);if(S.modal==='edit'){const t=S.tasks.find(x=>x.id===S.etid);Object.assign(t,{titre:f.get('titre'),type:f.get('type'),pr:f.get('pr'),statut:f.get('statut'),resp:f.get('resp'),ech:f.get('ech'),desc:f.get('desc'),ua:Date.now()})}else{S.tasks.push({id:uid(),cid:S.cid,titre:f.get('titre'),type:f.get('type'),statut:'nouveau',pr:f.get('pr'),resp:f.get('resp'),ech:f.get('ech'),desc:f.get('desc'),ca:Date.now(),ua:Date.now()})}S.tab='tasks';closeModal();save();render()}function submitAction(e){e.preventDefault();const f=new FormData(e.target);S.actions.push({id:uid(),cid:S.cid,titre:f.get('titre'),resp:f.get('resp'),ech:f.get('ech'),desc:f.get('desc'),done:false,ca:Date.now()});S.tab='actions';closeModal();save();render()}function submitComment(e){e.preventDefault();const f=new FormData(e.target);S.comments.push({id:uid(),cid:S.cid,aut:f.get('aut'),txt:f.get('txt'),ca:Date.now()});S.tab='comments';closeModal();save();render()}function toggleAction(id){const a=S.actions.find(x=>x.id===id);a.done=!a.done;save();render()}function exportData(){const blob=new Blob([JSON.stringify({clients:S.clients,tasks:S.tasks,actions:S.actions,comments:S.comments},null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='fid-suivi-client-export.json';a.click();URL.revokeObjectURL(url)}function render(){document.getElementById('app').innerHTML=S.view==='dashboard'?dashboard():S.view==='clients'?clients():detail()}load();render();
</script></body></html>
